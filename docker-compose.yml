services:
  pokemon-web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    restart: unless-stopped
    container_name: pokemon-pokedex
    depends_on:
      - pokemon-api

  pokemon-api:
    build: ./java-api
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=production
    restart: unless-stopped
    container_name: pokemon-api-service
