<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン図鑑</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>ポケモン図鑑</h1>
            <p>初期のポケモンたちを探してみよう！</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="pokemonSearch" placeholder="ポケモン名またはIDを入力（例：フシギダネ、1）">
                <button id="searchBtn">検索</button>
            </div>
            <div class="random-section">
                <button id="randomBtn">ランダムポケモン</button>
            </div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>ポケモンを探しています...</p>
        </div>

        <div id="error" class="error hidden">
            <p>ポケモンが見つかりませんでした。</p>
        </div>

        <div id="pokemonInfo" class="pokemon-info hidden">
            <div class="pokemon-card">
                <div class="pokemon-image">
                    <img id="pokemonImg" src="" alt="ポケモン画像">
                </div>
                <div class="pokemon-details">
                    <h2 id="pokemonName"></h2>
                    <div class="pokemon-id">
                        <span>No. <span id="pokemonId"></span></span>
                    </div>
                    <div class="pokemon-types">
                        <h3>タイプ</h3>
                        <div id="pokemonTypes"></div>
                    </div>
                    <div class="pokemon-stats">
                        <h3>基本情報</h3>
                        <div class="stat-row">
                            <span>高さ:</span>
                            <span id="pokemonHeight"></span>
                        </div>
                        <div class="stat-row">
                            <span>重さ:</span>
                            <span id="pokemonWeight"></span>
                        </div>
                    </div>
                    <div class="pokemon-abilities">
                        <h3>特性</h3>
                        <div id="pokemonAbilities"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pokemon-list-section">
            <div class="section-header">
                <h3>ポケモン一覧</h3>
                <div class="list-controls">
                    <button id="loadListBtn" class="load-btn">一覧を表示</button>
                    <select id="generationSelect">
                        <option value="1">第1世代 (1-151)</option>
                        <option value="2">第2世代 (152-251)</option>
                        <option value="3">第3世代 (252-386)</option>
                        <option value="4">第4世代 (387-493)</option>
                        <option value="5">第5世代 (494-649)</option>
                    </select>
                </div>
            </div>
            
            <div id="listLoading" class="loading hidden">
                <div class="spinner"></div>
                <p>ポケモン一覧を読み込み中...</p>
            </div>
            
            <div id="pokemonList" class="pokemon-list hidden">
                <div class="list-grid" id="pokemonListGrid"></div>
                <div class="pagination">
                    <button id="prevPage" class="page-btn" disabled>前へ</button>
                    <span id="pageInfo" class="page-info">ページ 1 / 1</span>
                    <button id="nextPage" class="page-btn" disabled>次へ</button>
                </div>
            </div>
        </div>

        <div class="popular-pokemon">
            <h3>人気のポケモン</h3>
            <div class="pokemon-grid">
                <button class="pokemon-btn" data-id="1">フシギダネ</button>
                <button class="pokemon-btn" data-id="4">ヒトカゲ</button>
                <button class="pokemon-btn" data-id="7">ゼニガメ</button>
                <button class="pokemon-btn" data-id="25">ピカチュウ</button>
                <button class="pokemon-btn" data-id="39">プリン</button>
                <button class="pokemon-btn" data-id="150">ミュウツー</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
